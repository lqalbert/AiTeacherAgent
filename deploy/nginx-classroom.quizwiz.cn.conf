# AiTeacherAgent 生产 HTTPS（子域名独立站点）
# 证书签发后使用；若 certbot 已自动改好 443，可不必再手工替换
#
# sudo cp deploy/nginx-classroom.quizwiz.cn.conf /etc/nginx/sites-available/aiteacher-classroom.conf
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name classroom.quizwiz.cn;

    ssl_certificate     /etc/letsencrypt/live/classroom.quizwiz.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/classroom.quizwiz.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name classroom.quizwiz.cn;
    return 301 https://$host$request_uri;
}
