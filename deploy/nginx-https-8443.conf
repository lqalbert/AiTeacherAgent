# HTTPS 测试环境（8443），解决浏览器在 HTTP+IP 下禁用麦克风的问题
#
# 1) 生成自签证书（仅测试用，浏览器会提示「不安全」点继续即可）：
#    sudo bash deploy/setup-https-selfsigned.sh
# 2) 启用本配置：
#    sudo cp deploy/nginx-https-8443.conf /etc/nginx/sites-available/aiteacher-https.conf
#    sudo ln -sf /etc/nginx/sites-available/aiteacher-https.conf /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# 3) 安全组放行 TCP 8443，访问 https://118.24.107.252:8443

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name 118.24.107.252 _;

    ssl_certificate     /etc/nginx/ssl/aiteacher.crt;
    ssl_certificate_key /etc/nginx/ssl/aiteacher.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
